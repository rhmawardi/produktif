<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#0d0d12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Productivity Vault" />
  <link rel="manifest" id="manifest-placeholder" />
  <title>⚡ Productivity Vault</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#0d0d12;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:#13131a;}
    ::-webkit-scrollbar-thumb{background:#2e2e42;border-radius:4px;}
    .pvault{font-family:'DM Sans',sans-serif;color:#dde1f0;height:100vh;display:flex;overflow:hidden;}
    .pvault h1,.pvault h2,.pvault h3,.pvault h4,.pvault h5,.pvault h6{font-family:'Syne',sans-serif;}
    .sidebar{width:220px;min-width:220px;background:#0d0d12;border-right:1px solid #1e1e2e;overflow-y:auto;display:flex;flex-direction:column;padding:0 0 24px 0;transition:transform .3s ease;}
    .sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid #1e1e2e;}
    .sidebar-logo h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;}
    .sidebar-section{padding:16px 14px 8px;}
    .sidebar-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#4a4a68;text-transform:uppercase;margin-bottom:6px;padding:0 4px;}
    .sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#8888aa;transition:all .15s;margin-bottom:2px;background:none;border:none;font-family:'DM Sans',sans-serif;width:100%;}
    .sidebar-item:hover{background:#1a1a28;color:#dde1f0;}
    .sidebar-item.active{background:#1e1e32;color:#fff;}
    .sidebar-icon{font-size:14px;width:18px;text-align:center;}
    .main{flex:1;overflow-y:auto;background:#0f0f17;}
    .main-header{padding:18px 24px;border-bottom:1px solid #1a1a28;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0f0f17;z-index:10;}
    .main-header h2{font-size:18px;font-weight:700;color:#fff;}
    .content{padding:20px 24px 80px;}
    .section{margin-bottom:28px;}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .section-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4a4a68;display:flex;align-items:center;gap:8px;}
    .section-title span{font-size:15px;}
    .card{background:#13131e;border:1px solid #1e1e2e;border-radius:12px;padding:14px;}
    .card-grid{display:grid;gap:12px;}
    .card-grid-2{grid-template-columns:repeat(2,1fr);}
    .card-grid-4{grid-template-columns:repeat(4,1fr);}
    .btn{border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
    .btn-primary{background:#e8622a;color:#fff;}
    .btn-primary:hover{background:#d4541f;transform:translateY(-1px);}
    .btn-ghost{background:transparent;color:#6666aa;border:1px solid #2a2a3e;}
    .btn-ghost:hover{background:#1a1a2e;color:#dde1f0;}
    .btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;}
    .btn-icon{width:28px;height:28px;padding:0;border-radius:6px;justify-content:center;font-size:14px;}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.3px;}
    .badge-red{background:rgba(239,68,68,.15);color:#f87171;}
    .badge-yellow{background:rgba(251,191,36,.15);color:#fbbf24;}
    .badge-green{background:rgba(74,222,128,.15);color:#4ade80;}
    .badge-blue{background:rgba(77,148,255,.15);color:#4d94ff;}
    .badge-orange{background:rgba(232,98,42,.15);color:#e8622a;}
    .progress-bar{height:4px;border-radius:2px;background:#1e1e2e;overflow:hidden;margin:4px 0;}
    .progress-fill{height:100%;border-radius:2px;transition:width .5s ease;}
    .heat-cell{border-radius:2px;cursor:pointer;transition:all .15s;}
    .heat-cell:hover{transform:scale(1.3);z-index:1;position:relative;}
    .tag-week{background:rgba(232,98,42,.2);color:#e8622a;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;}
    .tag-month{background:rgba(77,148,255,.2);color:#4d94ff;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;}
    .tag-day{background:rgba(74,222,128,.2);color:#4ade80;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;}
    .task-card{background:#13131e;border:1px solid #1e1e2e;border-radius:10px;padding:12px;transition:all .2s;}
    .task-card:hover{border-color:#2a2a42;transform:translateY(-1px);}
    .task-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .proj-card{background:#13131e;border:1px solid #1e1e2e;border-radius:12px;padding:14px;transition:all .2s;}
    .proj-card:hover{border-color:#2a2a42;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .cal-day-header{font-size:10px;font-weight:600;color:#4a4a68;text-align:center;padding:4px;}
    .cal-day{min-height:90px;max-height:200px;background:#13131e;border:1px solid #1e1e2e;border-radius:8px;padding:6px;cursor:pointer;transition:all .15s;overflow-y:auto;display:flex;flex-direction:column;}
    .cal-day-tasks{display:flex;flex-direction:column;gap:2px;flex:1;}
    .cal-day:hover{border-color:#2a2a42;}
    .cal-day.today{border-color:#e8622a;}
    .cal-day-num{font-size:11px;font-weight:700;color:#6666aa;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .cal-day-count{font-size:9px;font-weight:700;background:rgba(232,98,42,.2);color:#e8622a;padding:1px 5px;border-radius:100px;}
    .cal-day.today .cal-day-num span:first-child{color:#e8622a;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal{background:#15151f;border:1px solid #2a2a3e;border-radius:16px;padding:24px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;font-family:'Syne',sans-serif;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:11px;font-weight:600;color:#6666aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
    .form-input{width:100%;background:#0f0f17;border:1px solid #2a2a3e;border-radius:8px;padding:8px 12px;color:#dde1f0;font-family:'DM Sans',sans-serif;font-size:13px;transition:border .15s;}
    .form-input:focus{border-color:#e8622a;outline:none;}
    select.form-input option{background:#15151f;}
    textarea.form-input{resize:vertical;min-height:80px;}
    .mobile-header{display:none;padding:14px 16px;border-bottom:1px solid #1e1e2e;background:#0d0d12;position:sticky;top:0;z-index:10;align-items:center;justify-content:space-between;}
    .mobile-header h1{font-size:16px;font-weight:800;color:#fff;}
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d12;border-top:1px solid #1e1e2e;padding:8px 0 8px;z-index:100;}
    .mobile-nav-inner{display:flex;justify-content:space-around;}
    .mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;cursor:pointer;border-radius:8px;transition:all .15s;}
    .mobile-nav-item span:first-child{font-size:18px;}
    .mobile-nav-item span:last-child{font-size:9px;font-weight:600;color:#4a4a68;letter-spacing:.5px;text-transform:uppercase;}
    .mobile-nav-item.active span:last-child{color:#e8622a;}
    .perf-note{background:#13131e;border:1px solid #1e1e2e;border-radius:10px;padding:12px;font-size:12px;color:#8888aa;line-height:1.6;}
    .streak-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:#fff;}
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1a28;font-size:12px;}
    .stat-row:last-child{border:none;}
    .add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px dashed #2a2a3e;border-radius:10px;cursor:pointer;color:#4a4a68;font-size:12px;font-weight:500;transition:all .15s;background:transparent;width:100%;font-family:'DM Sans',sans-serif;}
    .add-btn:hover{border-color:#4a4a68;color:#8888aa;}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;}
    .drawer{position:fixed;left:0;top:0;bottom:0;width:240px;background:#0d0d12;border-right:1px solid #1e1e2e;z-index:201;transform:translateX(-100%);transition:transform .3s ease;overflow-y:auto;}
    .drawer.open{transform:translateX(0);}
    .inline-edit{background:transparent;border:none;color:inherit;font-family:inherit;font-size:inherit;font-weight:inherit;cursor:text;width:100%;}
    .inline-edit:focus{outline:1px solid #e8622a;border-radius:4px;background:#1a1a28;}
    @media(max-width:768px){
      .sidebar{display:none;}
      .mobile-header{display:flex;}
      .mobile-nav{display:block;}
      .content{padding:14px 12px 90px;}
      .card-grid-4{grid-template-columns:repeat(2,1fr);}
      .drawer-overlay.open{display:block;}
    }
    #install-banner{
      position:fixed;bottom:0;left:0;right:0;
      background:#1a1a2e;border-top:1px solid #e8622a55;
      padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));
      display:flex;justify-content:space-between;align-items:center;
      z-index:9999;transition:transform 0.3s ease;
    }
    #install-banner.hidden{display:none;}
    #install-banner p{font-size:12px;color:#dde1f0;flex:1;line-height:1.4;}
    #install-banner p span{font-weight:700;color:#e8622a;}
    #install-btn{background:#e8622a;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:12px;white-space:nowrap;flex-shrink:0;}
    #close-banner{background:transparent;border:none;color:#6666aa;font-size:18px;cursor:pointer;padding:4px;margin-left:6px;line-height:1;flex-shrink:0;}
    #install-guide{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;align-items:flex-end;justify-content:center;}
    #install-guide.show{display:flex;}
    #install-guide-box{background:#15151f;border:1px solid #2a2a3e;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;}
    #install-guide-box h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;}
    #install-guide-box .sub{font-size:12px;color:#6666aa;margin-bottom:20px;}
    .guide-step{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
    .guide-step-num{width:28px;height:28px;border-radius:50%;background:#e8622a;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .guide-step-text{font-size:13px;color:#dde1f0;line-height:1.5;}
    .guide-step-text strong{color:#fff;}
    #close-guide{width:100%;margin-top:8px;background:#1e1e32;border:1px solid #2a2a3e;border-radius:10px;padding:12px;color:#8888aa;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
